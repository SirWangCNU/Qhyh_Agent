# Alembic Configuration File
# See: https://alembic.sqlalchemy.org/en/latest/reference/config.html

[alembic]
# Migration script directory
script_location = alembic

# Database connection URL (overridden at runtime by env.py)
sqlalchemy.url = sqlite:///qinghe.db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
